MEMORY {
    ZEROPAGE: start = $0000, size = $0100, type = rw;
    BSSRAM:   start = $0200, size = $1E00, type = rw;
    ROM:      start = $8000, size = $8000, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZEROPAGE, type = zp;
    BSS:      load = BSSRAM, type = bss;

    CODE:     load = ROM, type = ro, start = $8000;
    RODATA:   load = ROM, type = ro;
    HEADER:   load = ROM, type = ro, start = $FFC0;
    VECTORS:  load = ROM, type = ro, start = $FFE0;
}
